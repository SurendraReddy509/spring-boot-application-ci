name: Hello Spring Boot App to Docker 

on:
    push

jobs:
    build-test:
        runs-on: ubuntu-latest
        
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: setup JDK
              uses: actions/setup-java@v5
              with:
                distribution: 'temurin' # See 'Supported distributions' for available options
                java-version: '21'

            - name: Build and Test (Maven)
              working-directory: docker/app1-hello/springboot/hello-spring
              run: mvn -B clean verify

            - name: Upload test reports
              uses: actions/upload-artifact@v4
              with:
                name: test-reports
                path: docker/app1-hello/springboot/hello-spring/target/surefire-reports
    Docker-build-push:
        runs-on: ubuntu-latest
        needs: build-test
        
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: setup JDK
              run: test-reports

            - name: Build JAR for Docker
              run: test-reports

            - name: Login to DockerHub
              run: test-reports

            - name: Build and Push Docker Image
              run: test-reports